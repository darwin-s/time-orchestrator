server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/darwin-s/time-orchestrator-config
          default-label: master
        native:
          search-locations: file:///${CONFIG_DIR}

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
